<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Latest news and updates from the University of Canterbury Rowing Club.">
<title>News — UC Rowing Club</title>
<link rel="stylesheet" href="style.css">
<style>
  .btn-edit-page {
    background: none;
    border: 1px solid var(--border);
    color: var(--gray-mid);
    padding: 7px 14px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    border-radius: 2px;
  }
  .btn-edit-page:hover { border-color: var(--maroon); color: var(--maroon); }

  .edit-mode-strip {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--maroon-light);
    border: 1px solid var(--border);
    border-left: 3px solid var(--maroon);
    padding: 0.75rem 1rem;
    margin-bottom: 1.75rem;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--maroon);
    font-weight: 700;
  }
  .edit-mode-strip .spacer { flex: 1; }

  /* NEWS CARDS */
  .news-list { display: flex; flex-direction: column; gap: 2rem; }

  .news-card {
    border: 1px solid var(--border);
    border-top: 3px solid var(--maroon);
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  .news-photo {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
  }

  .news-card-body { padding: 1.75rem 2rem; }

  .news-meta {
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gray-mid);
    margin-bottom: 0.6rem;
  }

  .news-title {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 24px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 1rem;
    padding-right: 6rem;
    line-height: 1.2;
  }

  .news-body {
    font-family: Arial, sans-serif;
    font-size: 15px;
    color: var(--gray-dark);
    line-height: 1.75;
    white-space: pre-line;
  }

  .news-card-actions {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    display: flex;
    gap: 0.4rem;
  }

  .btn-card-action {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--gray-mid);
    padding: 4px 10px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .btn-card-action:hover { border-color: var(--maroon); color: var(--maroon); }
  .btn-card-action.delete:hover { border-color: #CC0000; color: #CC0000; }

  /* PLACEHOLDER */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    border: 1px dashed var(--border);
  }
  .empty-title {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--gray-mid);
    margin-bottom: 0.5rem;
  }
  .empty-desc { font-family: Arial, sans-serif; font-size: 13px; color: var(--gray-mid); }

  /* POST MODAL */
  .post-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  .post-modal-overlay.open { display: flex; }
  .post-modal {
    background: var(--white);
    border-top: 3px solid var(--maroon);
    padding: 2rem;
    width: 90%;
    max-width: 580px;
    position: relative;
    margin: auto;
  }
  .post-modal-heading {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    padding-right: 2.5rem;
  }
  .post-modal-close {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    background: none; border: none;
    font-size: 20px; cursor: pointer;
    color: var(--gray-mid); line-height: 1;
  }
  .post-modal-close:hover { color: var(--black); }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  /* PHOTO UPLOAD IN MODAL */
  .photo-upload-area {
    border: 1px dashed var(--border);
    padding: 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .photo-thumb {
    width: 80px;
    height: 60px;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .photo-upload-actions { display: flex; flex-direction: column; gap: 0.4rem; }
  .btn-photo-action {
    background: none;
    border: 1px solid var(--border);
    color: var(--gray-mid);
    padding: 4px 12px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-photo-action:hover { border-color: var(--maroon); color: var(--maroon); }
  .btn-photo-action.remove:hover { border-color: #CC0000; color: #CC0000; }

  /* CUSTOM CONFIRM */
  #confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 600;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--maroon);
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 13px;
    padding: 0.75rem 1.25rem;
    z-index: 500;
    display: none;
    border-radius: 2px;
  }

  @media (max-width: 600px) {
    .news-card-body { padding: 1.25rem; }
    .news-photo { height: 200px; }
    .news-title { font-size: 20px; padding-right: 0; }
    .news-card-actions { position: static; margin-bottom: 0.75rem; }
    .modal-grid { grid-template-columns: 1fr; }
    .edit-mode-strip { flex-wrap: wrap; row-gap: 0.5rem; }
    .edit-mode-strip .spacer { display: none; }
  }
</style>
</head>
<body>

<div id="nav-placeholder" data-active="News"></div>

<div class="page-header">
  <div class="page-header-inner">
    <p class="page-eyebrow">UC Rowing Club</p>
    <h1 class="page-title">News</h1>
  </div>
</div>

<main>
  <div id="news-top-bar"></div>
  <div id="news-content">
    <div class="empty-state"><div class="empty-title">Loading...</div></div>
  </div>
</main>

<!-- CUSTOM CONFIRM DIALOG -->
<div id="confirm-overlay" style="align-items:center; justify-content:center;">
  <div style="background:var(--white); border-top:3px solid var(--maroon); padding:2rem; width:90%; max-width:360px;">
    <p id="confirm-message" style="font-family:Arial,sans-serif; font-size:15px; color:var(--black); margin:0 0 1.5rem; line-height:1.5;"></p>
    <div style="display:flex; gap:0.75rem;">
      <button id="confirm-ok" class="btn-primary"></button>
      <button id="confirm-cancel" class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT POST MODAL -->
<div class="post-modal-overlay" id="post-modal">
  <div class="post-modal">
    <button class="post-modal-close" onclick="closePostModal()">✕</button>
    <div class="post-modal-heading" id="post-modal-heading">New post</div>

    <div class="modal-grid">
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="post-author-input" placeholder="e.g. Sam Wilson">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="post-date-input">
      </div>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="post-title-input" placeholder="e.g. Season kickoff — registrations open">
    </div>
    <div class="form-group">
      <label>Body</label>
      <textarea id="post-body-input" placeholder="Write your post here..." style="min-height:180px; resize:vertical;"></textarea>
    </div>

    <div class="form-group">
      <label>Photo <span style="font-weight:400;color:var(--gray-mid);">(optional)</span></label>
      <div id="modal-photo-area"></div>
      <input type="file" id="post-photo-input" accept="image/*" style="display:none;">
      <div class="form-hint">JPEG or PNG, max 15 MB. Displayed at the top of the article.</div>
    </div>

    <div id="post-modal-error" style="color:var(--maroon); font-size:13px; margin-bottom:0.75rem; display:none;"></div>
    <div style="display:flex; gap:0.75rem;">
      <button class="btn-primary" id="post-save-btn" onclick="savePost()">Publish post</button>
      <button class="btn-secondary" onclick="closePostModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="footer-placeholder"></div>
<script type="module" src="nav.js"></script>

<script type="module">
import { supabase } from './supabase.js'

let isAdmin       = false
let posts         = []
let isEditMode    = false
let editingPostId = null

// photo state for modal
let existingPhotoUrl  = null
let existingPhotoPath = null
let pendingRemove     = false
let newPhotoFile      = null
let newPhotoPreview   = null

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')
}

function formatDate(dateStr) {
  if (!dateStr) return ''
  const [y, m, d] = dateStr.split('-').map(Number)
  const months = ['January','February','March','April','May','June','July',
                  'August','September','October','November','December']
  return `${d} ${months[m - 1]} ${y}`
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.style.display = 'block'
  setTimeout(() => t.style.display = 'none', 2500)
}

function customConfirm(message, confirmLabel = 'Confirm') {
  return new Promise(resolve => {
    const overlay = document.getElementById('confirm-overlay')
    document.getElementById('confirm-message').textContent = message
    document.getElementById('confirm-ok').textContent = confirmLabel
    overlay.style.display = 'flex'
    function done(result) {
      overlay.style.display = 'none'
      document.getElementById('confirm-ok').removeEventListener('click', onOk)
      document.getElementById('confirm-cancel').removeEventListener('click', onCancel)
      resolve(result)
    }
    function onOk()     { done(true) }
    function onCancel() { done(false) }
    document.getElementById('confirm-ok').addEventListener('click', onOk)
    document.getElementById('confirm-cancel').addEventListener('click', onCancel)
  })
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadPosts() {
  const { data } = await supabase
    .from('news_posts')
    .select('*')
    .eq('archived', false)
    .order('post_date', { ascending: false })
    .order('created_at', { ascending: false })
  posts = data || []
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTopBar() {
  const bar = document.getElementById('news-top-bar')
  if (!isAdmin) { bar.innerHTML = ''; return }

  if (isEditMode) {
    bar.innerHTML = `
      <div class="edit-mode-strip">
        <span>Edit mode — changes save immediately</span>
        <button class="btn-primary" style="font-size:13px;padding:7px 16px;" onclick="openPostModal()">+ Add post</button>
        <span class="spacer"></span>
        <button class="btn-secondary" onclick="exitEditMode()">Done editing</button>
      </div>`
  } else {
    bar.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:1.25rem;">
        <button class="btn-edit-page" onclick="enterEditMode()">✎ Edit page</button>
      </div>`
  }
}

function renderPosts() {
  const el = document.getElementById('news-content')

  const archiveLink = `
    <div style="margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);text-align:center;">
      <a href="news-archive.html" style="font-family:Arial,sans-serif;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray-mid);text-decoration:none;">
        View news archive →
      </a>
    </div>`

  if (posts.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-title">No news yet</div>
      <div class="empty-desc">Check back soon for club updates.</div>
    </div>${archiveLink}`
    return
  }

  el.innerHTML = `<div class="news-list">${posts.map(buildCard).join('')}</div>${archiveLink}`
}

function buildCard(p) {
  const photo = p.photo_url
    ? `<img class="news-photo" src="${esc(p.photo_url)}" alt="">`
    : ''

  const actions = isEditMode ? `
    <div class="news-card-actions">
      <button class="btn-card-action" onclick="openPostModal('${p.id}')">Edit</button>
      <button class="btn-card-action" onclick="archivePost('${p.id}', '${esc(p.title)}')">Archive</button>
      <button class="btn-card-action delete" onclick="deletePost('${p.id}', '${esc(p.title)}', '${esc(p.photo_path ?? '')}')">Delete</button>
    </div>` : ''

  return `<div class="news-card">
    ${photo}
    <div class="news-card-body">
      ${actions}
      <div class="news-meta">${esc(formatDate(p.post_date))} &nbsp;·&nbsp; By ${esc(p.author)}</div>
      <div class="news-title">${esc(p.title)}</div>
      <div class="news-body">${esc(p.body)}</div>
    </div>
  </div>`
}

// ── EDIT MODE ─────────────────────────────────────────────────────────────────
window.enterEditMode = function() { isEditMode = true;  renderTopBar(); renderPosts() }
window.exitEditMode  = function() { isEditMode = false; renderTopBar(); renderPosts() }

// ── POST MODAL ────────────────────────────────────────────────────────────────
function renderModalPhoto() {
  const area = document.getElementById('modal-photo-area')
  const previewSrc = newPhotoPreview || (pendingRemove ? null : existingPhotoUrl)

  if (previewSrc) {
    const label = newPhotoFile ? 'New photo selected' : 'Current photo'
    area.innerHTML = `
      <div class="photo-upload-area">
        <img class="photo-thumb" src="${esc(previewSrc)}" alt="">
        <div class="photo-upload-actions">
          <span style="font-family:Arial,sans-serif;font-size:11px;color:var(--gray-mid);">${label}</span>
          <button type="button" class="btn-photo-action" onclick="document.getElementById('post-photo-input').click()">Replace photo</button>
          <button type="button" class="btn-photo-action remove" onclick="clearModalPhoto()">Remove photo</button>
        </div>
      </div>`
  } else {
    area.innerHTML = `
      <button type="button" class="btn-photo-action" style="margin-bottom:0.4rem;"
        onclick="document.getElementById('post-photo-input').click()">+ Add a photo</button>`
  }
}

window.clearModalPhoto = function() {
  if (newPhotoPreview) URL.revokeObjectURL(newPhotoPreview)
  newPhotoFile    = null
  newPhotoPreview = null
  pendingRemove   = true
  renderModalPhoto()
}

window.openPostModal = function(postId = null) {
  editingPostId    = postId
  const p          = postId ? posts.find(x => x.id === postId) : null
  existingPhotoUrl  = p?.photo_url  || null
  existingPhotoPath = p?.photo_path || null
  pendingRemove    = false
  newPhotoFile     = null
  if (newPhotoPreview) URL.revokeObjectURL(newPhotoPreview)
  newPhotoPreview  = null

  document.getElementById('post-modal-heading').textContent = postId ? 'Edit post' : 'New post'
  document.getElementById('post-title-input').value  = p?.title    || ''
  document.getElementById('post-author-input').value = p?.author   || ''
  document.getElementById('post-date-input').value   = p?.post_date || new Date().toISOString().split('T')[0]
  document.getElementById('post-body-input').value   = p?.body     || ''
  document.getElementById('post-modal-error').style.display = 'none'
  document.getElementById('post-save-btn').textContent = postId ? 'Save changes' : 'Publish post'
  document.getElementById('post-photo-input').value = ''

  renderModalPhoto()
  document.getElementById('post-modal').classList.add('open')
  setTimeout(() => document.getElementById('post-title-input').focus(), 50)
}

window.closePostModal = function() {
  document.getElementById('post-modal').classList.remove('open')
  if (newPhotoPreview) URL.revokeObjectURL(newPhotoPreview)
  newPhotoPreview = null
  newPhotoFile    = null
}

document.getElementById('post-photo-input').addEventListener('change', function() {
  const file = this.files[0]
  if (!file) return
  if (file.size > 15 * 1024 * 1024) {
    document.getElementById('post-modal-error').textContent = 'Photo must be under 15 MB.'
    document.getElementById('post-modal-error').style.display = 'block'
    this.value = ''
    return
  }
  if (newPhotoPreview) URL.revokeObjectURL(newPhotoPreview)
  newPhotoFile    = file
  newPhotoPreview = URL.createObjectURL(file)
  pendingRemove   = false
  renderModalPhoto()
})

window.savePost = async function() {
  const title  = document.getElementById('post-title-input').value.trim()
  const author = document.getElementById('post-author-input').value.trim()
  const date   = document.getElementById('post-date-input').value
  const body   = document.getElementById('post-body-input').value.trim()
  const err    = document.getElementById('post-modal-error')
  const btn    = document.getElementById('post-save-btn')
  err.style.display = 'none'

  if (!title || !author || !date || !body) {
    err.textContent = 'All fields are required.'
    err.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = 'Saving...'

  // Handle photo
  let finalPhotoUrl  = existingPhotoUrl
  let finalPhotoPath = existingPhotoPath

  // Remove old photo if flagged
  if (pendingRemove && existingPhotoPath) {
    await supabase.storage.from('news').remove([existingPhotoPath])
    finalPhotoUrl  = null
    finalPhotoPath = null
  }

  // Upload new photo if selected
  if (newPhotoFile) {
    const ext  = newPhotoFile.name.split('.').pop()
    const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`
    const { error: upErr } = await supabase.storage.from('news').upload(path, newPhotoFile)
    if (upErr) {
      err.textContent = 'Photo upload failed: ' + upErr.message
      err.style.display = 'block'
      btn.disabled = false
      btn.textContent = editingPostId ? 'Save changes' : 'Publish post'
      return
    }
    // Delete old photo if replacing
    if (existingPhotoPath && !pendingRemove) {
      await supabase.storage.from('news').remove([existingPhotoPath])
    }
    const { data: urlData } = supabase.storage.from('news').getPublicUrl(path)
    finalPhotoUrl  = urlData.publicUrl
    finalPhotoPath = path
  }

  const payload = { title, author, post_date: date, body, photo_url: finalPhotoUrl, photo_path: finalPhotoPath }
  let error
  if (editingPostId) {
    ;({ error } = await supabase.from('news_posts').update(payload).eq('id', editingPostId))
  } else {
    ;({ error } = await supabase.from('news_posts').insert(payload))
  }

  btn.disabled = false
  btn.textContent = editingPostId ? 'Save changes' : 'Publish post'

  if (error) { err.textContent = error.message; err.style.display = 'block'; return }

  closePostModal()
  await loadPosts()
  renderPosts()
  showToast(editingPostId ? 'Post updated ✓' : 'Post published ✓')
}

window.archivePost = async function(id, title) {
  if (!await customConfirm(`Archive "${title}"? It will move to the news archive and won't appear on this page.`, 'Archive')) return
  await supabase.from('news_posts').update({ archived: true }).eq('id', id)
  await loadPosts()
  renderPosts()
  showToast('Post archived')
}

window.deletePost = async function(id, title, photoPath) {
  if (!await customConfirm(`Delete "${title}"? This cannot be undone.`, 'Delete post')) return
  if (photoPath) await supabase.storage.from('news').remove([photoPath])
  await supabase.from('news_posts').delete().eq('id', id)
  await loadPosts()
  renderPosts()
  showToast('Post deleted')
}

document.getElementById('post-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePostModal()
})

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadPosts()
  renderPosts()
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    const { data: me } = await supabase
      .from('members').select('is_admin').eq('id', session.user.id).single()
    isAdmin = me?.is_admin === true
  }
  renderTopBar()
}

init()
</script>
</body>
</html>
