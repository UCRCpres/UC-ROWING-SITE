<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — UC Rowing Club</title>
<link rel="stylesheet" href="style.css">
<style>
  .events-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    margin: 1.5rem 0 2.5rem;
  }
  .event-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--white);
    padding: 1.25rem 1.75rem;
    gap: 2rem;
  }
  .event-name {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 19px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--black);
  }
  .event-date {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--maroon);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .section-separator {
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-mid);
    padding: 0.6rem 1.75rem;
    background: var(--gray-light);
    border: 1px solid var(--border);
  }

  .past .event-name { color: var(--gray-mid); }
  .past .event-date { color: #999; }
  .past { opacity: 0.7; }

  @media (max-width: 600px) {
    .event-row { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
  }
</style>
</head>
<body>

<div id="nav-placeholder" data-active="Events"></div>

<div class="page-header">
  <div class="page-header-inner">
    <p class="page-eyebrow">UC Rowing Club</p>
    <h1 class="page-title">Events</h1>
  </div>
</div>

<main>

  <div class="section-separator">Upcoming</div>
  <div class="events-list">
    <div class="event-row">
      <div class="event-name">Quiz Night</div>
      <div class="event-date">July 2026</div>
    </div>
    <div class="event-row">
      <div class="event-name">UC Sprint Regatta</div>
      <div class="event-date">October 2026</div>
    </div>
    <div class="event-row">
      <div class="event-name">AGM</div>
      <div class="event-date">October 2026</div>
    </div>
  </div>

  <div class="section-separator">Past 2026 events</div>
  <div class="events-list">
    <div class="event-row past">
      <div class="event-name">Otago Exchange</div>
      <div class="event-date">8–10 May 2026</div>
    </div>
    <div class="event-row past">
      <div class="event-name">2026 University Rowing Championships</div>
      <div class="event-date">3–4 April 2026</div>
    </div>
    <div class="event-row past">
      <div class="event-name">UCRC Singlet Night</div>
      <div class="event-date">1 April 2026</div>
    </div>
    <div class="event-row past">
      <div class="event-name">UCRC ABC Party</div>
      <div class="event-date">25 February 2026</div>
    </div>
    <div class="event-row past">
      <div class="event-name">UCRC Open Day</div>
      <div class="event-date">25 February 2026</div>
    </div>
  </div>

</main>

<div id="footer-placeholder"></div>
<script src="nav.js"></script>
</body>
</html>
