<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="UC Rowing Club race calendar — upcoming regattas, events, and results for the Canterbury rowing season.">
<title>Events & Regattas — UC Rowing Club</title>
<link rel="stylesheet" href="style.css">
<style>
  /* SECTION HEADER */
  .section-separator {
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-mid);
    padding: 0.6rem 1.75rem;
    background: var(--gray-light);
    border: 1px solid var(--border);
  }

  /* EVENT LIST */
  .events-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    margin: 0 0 2.5rem;
  }

  .event-row {
    display: flex;
    align-items: center;
    background: var(--white);
    padding: 1.25rem 1.75rem;
    gap: 1.5rem;
  }

  .event-main { flex: 1; min-width: 0; }

  .event-name {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 19px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--black);
    line-height: 1.2;
  }
  .event-notes {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-mid);
    margin-top: 0.2rem;
    line-height: 1.4;
  }

  .event-date {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--maroon);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* PAST EVENTS */
  .event-row.past .event-name { color: var(--gray-mid); }
  .event-row.past .event-date { color: #999; }
  .event-row.past { opacity: 0.75; }

  /* EDIT MODE ROW ACTIONS */
  .event-actions {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }
  .btn-ev-action {
    background: none;
    border: 1px solid var(--border);
    color: var(--gray-mid);
    padding: 4px 10px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-ev-action:hover { border-color: var(--maroon); color: var(--maroon); }
  .btn-ev-action.delete:hover { border-color: #CC0000; color: #CC0000; }

  /* EDIT MODE STRIP */
  .edit-mode-strip {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--maroon-light);
    border: 1px solid var(--border);
    border-left: 3px solid var(--maroon);
    padding: 0.75rem 1rem;
    margin-bottom: 1.75rem;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--maroon);
    font-weight: 700;
  }
  .edit-mode-strip .spacer { flex: 1; }

  .btn-edit-page {
    background: none;
    border: 1px solid var(--border);
    color: var(--gray-mid);
    padding: 7px 14px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    border-radius: 2px;
  }
  .btn-edit-page:hover { border-color: var(--maroon); color: var(--maroon); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    border: 1px dashed var(--border);
    margin-bottom: 2.5rem;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-mid);
  }

  /* EVENT MODAL */
  .event-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow-y: auto;
  }
  .event-modal-overlay.open { display: flex; }
  .event-modal {
    background: var(--white);
    border-top: 3px solid var(--maroon);
    padding: 2rem;
    width: 90%;
    max-width: 520px;
    position: relative;
    margin: auto;
  }
  .event-modal-heading {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    padding-right: 2.5rem;
  }
  .event-modal-close {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    background: none; border: none;
    font-size: 20px; cursor: pointer;
    color: var(--gray-mid); line-height: 1;
  }
  .event-modal-close:hover { color: var(--black); }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  /* CUSTOM CONFIRM */
  #confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 600;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--maroon);
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 13px;
    padding: 0.75rem 1.25rem;
    z-index: 500;
    display: none;
    border-radius: 2px;
  }

  @media (max-width: 600px) {
    .event-row { flex-wrap: wrap; gap: 0.5rem; padding: 1rem 1.25rem; }
    .event-actions { width: 100%; }
    .modal-grid { grid-template-columns: 1fr; }
    .edit-mode-strip { flex-wrap: wrap; row-gap: 0.5rem; }
    .edit-mode-strip .spacer { display: none; }
  }
</style>
</head>
<body>

<div id="nav-placeholder" data-active="Events"></div>

<div class="page-header">
  <div class="page-header-inner">
    <p class="page-eyebrow">UC Rowing Club</p>
    <h1 class="page-title">Events</h1>
  </div>
</div>

<main>
  <div id="events-top-bar"></div>
  <div id="events-content">
    <div class="empty-state">Loading...</div>
  </div>
</main>

<!-- CUSTOM CONFIRM DIALOG -->
<div id="confirm-overlay" style="align-items:center; justify-content:center;">
  <div style="background:var(--white); border-top:3px solid var(--maroon); padding:2rem; width:90%; max-width:360px;">
    <p id="confirm-message" style="font-family:Arial,sans-serif; font-size:15px; color:var(--black); margin:0 0 1.5rem; line-height:1.5;"></p>
    <div style="display:flex; gap:0.75rem;">
      <button id="confirm-ok" class="btn-primary"></button>
      <button id="confirm-cancel" class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT EVENT MODAL -->
<div class="event-modal-overlay" id="event-modal">
  <div class="event-modal">
    <button class="event-modal-close" onclick="closeEventModal()">✕</button>
    <div class="event-modal-heading" id="event-modal-heading">New event</div>

    <div class="form-group">
      <label>Event name</label>
      <input type="text" id="ev-name-input" placeholder="e.g. UC Sprint Regatta">
    </div>
    <div class="modal-grid">
      <div class="form-group" style="margin-bottom:0;">
        <label>Date</label>
        <input type="date" id="ev-date-input">
        <div class="form-hint">Used to sort upcoming vs past</div>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Display label <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <input type="text" id="ev-display-input" placeholder="e.g. 8–10 May 2026">
        <div class="form-hint">Leave blank to auto-format the date</div>
      </div>
    </div>
    <div class="form-group" style="margin-top:0.75rem;">
      <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
      <input type="text" id="ev-notes-input" placeholder="e.g. at Kerr's Reach — dinner to follow">
    </div>

    <div id="event-modal-error" style="color:var(--maroon); font-size:13px; margin-bottom:0.75rem; display:none;"></div>
    <div style="display:flex; gap:0.75rem; margin-top:1.25rem;">
      <button class="btn-primary" id="event-save-btn" onclick="saveEvent()">Add event</button>
      <button class="btn-secondary" onclick="closeEventModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="footer-placeholder"></div>
<script type="module" src="nav.js"></script>

<script type="module">
import { supabase } from './supabase.js'

let isAdmin     = false
let events      = []
let isEditMode  = false
let editingId   = null

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;')
}

function formatDate(dateStr) {
  if (!dateStr) return ''
  const [y, m, d] = dateStr.split('-').map(Number)
  const months = ['January','February','March','April','May','June','July',
                  'August','September','October','November','December']
  return `${d} ${months[m - 1]} ${y}`
}

function todayStr() {
  const d = new Date()
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.style.display = 'block'
  setTimeout(() => t.style.display = 'none', 2500)
}

// ── CUSTOM CONFIRM ────────────────────────────────────────────────────────────
function customConfirm(message, confirmLabel = 'Confirm') {
  return new Promise(resolve => {
    const overlay = document.getElementById('confirm-overlay')
    document.getElementById('confirm-message').textContent = message
    document.getElementById('confirm-ok').textContent = confirmLabel
    overlay.style.display = 'flex'

    function done(result) {
      overlay.style.display = 'none'
      document.getElementById('confirm-ok').removeEventListener('click', onOk)
      document.getElementById('confirm-cancel').removeEventListener('click', onCancel)
      resolve(result)
    }
    function onOk()     { done(true) }
    function onCancel() { done(false) }
    document.getElementById('confirm-ok').addEventListener('click', onOk)
    document.getElementById('confirm-cancel').addEventListener('click', onCancel)
  })
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadEvents() {
  const { data } = await supabase.from('events').select('*').order('event_date')
  events = data || []
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTopBar() {
  const bar = document.getElementById('events-top-bar')
  if (!isAdmin) { bar.innerHTML = ''; return }

  if (isEditMode) {
    bar.innerHTML = `
      <div class="edit-mode-strip">
        <span>Edit mode — changes save immediately</span>
        <button class="btn-primary" style="font-size:13px;padding:7px 16px;" onclick="openEventModal()">+ Add event</button>
        <span class="spacer"></span>
        <button class="btn-secondary" onclick="exitEditMode()">Done editing</button>
      </div>`
  } else {
    bar.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:1.25rem;">
        <button class="btn-edit-page" onclick="enterEditMode()">✎ Edit page</button>
      </div>`
  }
}

function renderEvents() {
  const today = todayStr()
  const upcoming = events.filter(e => e.event_date >= today).sort((a, b) => a.event_date.localeCompare(b.event_date))
  const past     = events.filter(e => e.event_date < today).sort((a, b) => b.event_date.localeCompare(a.event_date))

  const el = document.getElementById('events-content')
  let html = ''

  html += `<div class="section-separator">Upcoming</div>`
  if (upcoming.length === 0) {
    html += `<div class="empty-state" style="margin-bottom:2.5rem;">No upcoming events — check back soon.</div>`
  } else {
    html += `<div class="events-list">${upcoming.map(e => buildRow(e, false)).join('')}</div>`
  }

  html += `<div class="section-separator">Past events</div>`
  if (past.length === 0) {
    html += `<div class="empty-state">No past events yet.</div>`
  } else {
    html += `<div class="events-list">${past.map(e => buildRow(e, true)).join('')}</div>`
  }

  el.innerHTML = html
}

function buildRow(e, isPast) {
  const pastCls   = isPast ? ' past' : ''
  const dateLabel = esc(e.display_date || formatDate(e.event_date))
  const notes     = e.notes ? `<div class="event-notes">${esc(e.notes)}</div>` : ''

  const actions = isEditMode ? `
    <div class="event-actions">
      <button class="btn-ev-action" onclick="openEventModal('${e.id}')">Edit</button>
      <button class="btn-ev-action delete" onclick="deleteEvent('${e.id}', '${esc(e.name)}')">Delete</button>
    </div>` : ''

  return `<div class="event-row${pastCls}">
    <div class="event-main">
      <div class="event-name">${esc(e.name)}</div>
      ${notes}
    </div>
    <div class="event-date">${dateLabel}</div>
    ${actions}
  </div>`
}

// ── EDIT MODE ─────────────────────────────────────────────────────────────────
window.enterEditMode = function() { isEditMode = true;  renderTopBar(); renderEvents(); }
window.exitEditMode  = function() { isEditMode = false; renderTopBar(); renderEvents(); }

// ── EVENT MODAL ───────────────────────────────────────────────────────────────
window.openEventModal = function(id = null) {
  editingId = id
  const ev = id ? events.find(x => x.id === id) : null

  document.getElementById('event-modal-heading').textContent = id ? 'Edit event' : 'New event'
  document.getElementById('event-save-btn').textContent      = id ? 'Save changes' : 'Add event'
  document.getElementById('ev-name-input').value    = ev?.name         || ''
  document.getElementById('ev-date-input').value    = ev?.event_date   || ''
  document.getElementById('ev-display-input').value = ev?.display_date || ''
  document.getElementById('ev-notes-input').value   = ev?.notes        || ''
  document.getElementById('event-modal-error').style.display = 'none'

  document.getElementById('event-modal').classList.add('open')
  setTimeout(() => document.getElementById('ev-name-input').focus(), 50)
}

window.closeEventModal = function() {
  document.getElementById('event-modal').classList.remove('open')
}

window.saveEvent = async function() {
  const name         = document.getElementById('ev-name-input').value.trim()
  const event_date   = document.getElementById('ev-date-input').value
  const display_date = document.getElementById('ev-display-input').value.trim()
  const notes        = document.getElementById('ev-notes-input').value.trim()
  const err          = document.getElementById('event-modal-error')
  err.style.display  = 'none'

  if (!name || !event_date) {
    err.textContent = 'Event name and date are required.'
    err.style.display = 'block'
    return
  }

  let error
  if (editingId) {
    ;({ error } = await supabase.from('events')
      .update({ name, event_date, display_date, notes })
      .eq('id', editingId))
  } else {
    ;({ error } = await supabase.from('events')
      .insert({ name, event_date, display_date, notes }))
  }

  if (error) { err.textContent = error.message; err.style.display = 'block'; return }

  closeEventModal()
  await loadEvents()
  renderEvents()
  showToast(editingId ? 'Event updated ✓' : 'Event added ✓')
}

window.deleteEvent = async function(id, name) {
  if (!await customConfirm(`Delete "${name}"? This cannot be undone.`, 'Delete event')) return
  await supabase.from('events').delete().eq('id', id)
  await loadEvents()
  renderEvents()
  showToast('Event deleted')
}

// Close modal on backdrop click
document.getElementById('event-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEventModal()
})

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadEvents()
  renderEvents()

  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    const { data: me } = await supabase
      .from('members').select('is_admin').eq('id', session.user.id).single()
    isAdmin = me?.is_admin === true
  }
  renderTopBar()
}

init()
</script>
</body>
</html>
