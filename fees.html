<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Fees — UC Rowing Club</title>
<link rel="stylesheet" href="style.css">
<style>
  .fees-section { margin-bottom: 3rem; }

  .fees-section-title {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gray-mid);
    margin-bottom: 1.1rem;
  }

  .fee-card {
    border: 1px solid var(--border);
    border-left: 3px solid var(--maroon);
    background: var(--white);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .fee-card.optional { border-left-color: var(--gold); }

  .fee-card-info { flex: 1; min-width: 0; }

  .fee-card-name {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 19px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--black);
    line-height: 1.2;
  }

  .fee-card-meta {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--gray-mid);
    margin-top: 4px;
  }

  .optional-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 2px 6px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .btn-pay {
    background: var(--maroon);
    color: var(--white);
    border: none;
    padding: 10px 20px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 2px;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .btn-pay:hover:not(:disabled) { background: #55172f; }
  .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

  .paid-list { list-style: none; padding: 0; margin: 0; border: 1px solid var(--border); }
  .paid-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-family: Arial, sans-serif;
    font-size: 14px;
    background: var(--white);
    flex-wrap: wrap;
  }
  .paid-item:last-child { border-bottom: none; }
  .paid-check { color: #2D8C2D; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .paid-item-name { flex: 1; color: var(--gray-dark); min-width: 0; }
  .paid-item-amount { color: var(--gray-dark); font-weight: 700; white-space: nowrap; }
  .paid-item-date { color: var(--gray-mid); font-size: 12px; white-space: nowrap; }

  .empty-section {
    padding: 2.5rem 1.5rem;
    text-align: center;
    border: 1px dashed var(--border);
    color: var(--gray-mid);
    font-family: Arial, sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  .login-prompt { text-align: center; padding: 5rem 1rem; }
  .login-prompt-title {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 26px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 1rem;
  }
  .login-prompt-text {
    font-family: Arial, sans-serif;
    font-size: 15px;
    color: var(--gray-mid);
    margin-bottom: 1.75rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--maroon);
    color: var(--white);
    font-family: Arial, sans-serif;
    font-size: 13px;
    padding: 0.75rem 1.25rem;
    z-index: 500;
    display: none;
    border-radius: 2px;
  }

  @media (max-width: 600px) {
    .fee-card { flex-direction: column; align-items: flex-start; }
    .btn-pay { width: 100%; text-align: center; }
    .paid-item { flex-wrap: wrap; row-gap: 0.25rem; }
    .paid-item-date { width: 100%; padding-left: 2rem; }
  }
</style>
</head>
<body>

<div id="nav-placeholder" data-active="Fees"></div>

<div class="page-header">
  <div class="page-header-inner">
    <p class="page-eyebrow">Members area</p>
    <h1 class="page-title">My Fees</h1>
  </div>
</div>

<main id="fees-logged-out" style="display:none;">
  <div class="login-prompt">
    <div class="login-prompt-title">Members only</div>
    <p class="login-prompt-text">Please log in to view your fees and make payments.</p>
    <button class="btn-primary" onclick="window.openLoginModal()">Log in</button>
  </div>
</main>

<main id="fees-content" style="display:none;"></main>

<div class="toast" id="toast"></div>
<div id="footer-placeholder"></div>
<script type="module" src="nav.js"></script>

<script type="module">
import { supabase } from './supabase.js'

let userId = null
let myFees = []
let optionalFeeTypes = []

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}

function formatDate(dateStr) {
  if (!dateStr) return ''
  const [y, m, d] = dateStr.split('-').map(Number)
  const months = ['January','February','March','April','May','June','July',
                  'August','September','October','November','December']
  return `${d} ${months[m - 1]} ${y}`
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.style.display = 'block'
  setTimeout(() => t.style.display = 'none', 3500)
}

async function loadData() {
  const [feesRes, typesRes] = await Promise.all([
    supabase.from('fees').select('*, fee_types(is_optional)').eq('member_id', userId).order('due_date', { ascending: true, nullsFirst: false }),
    supabase.from('fee_types').select('*').eq('is_optional', true).order('created_at', { ascending: false })
  ])
  myFees          = feesRes.data  || []
  optionalFeeTypes = typesRes.data || []
}

function render() {
  const unpaid = myFees.filter(f => !f.paid && !f.fee_types?.is_optional)
  const paid   = myFees.filter(f => f.paid).sort((a, b) =>
    (b.paid_date || '').localeCompare(a.paid_date || '')
  )

  // Optional fees: types this member hasn't paid yet
  const paidTypeIds = paid.map(f => f.fee_type_id).filter(Boolean)
  const optionalAvailable = optionalFeeTypes.filter(ft => !paidTypeIds.includes(ft.id))

  let html = ''

  // OUTSTANDING FEES
  html += `<div class="fees-section">
    <div class="fees-section-title">Outstanding fees</div>`

  if (!unpaid.length) {
    html += `<div class="empty-section">You have no outstanding fees — you're all good!</div>`
  } else {
    html += unpaid.map(f => {
      const due = f.due_date ? ` &nbsp;·&nbsp; Due ${formatDate(f.due_date)}` : ''
      return `<div class="fee-card">
        <div class="fee-card-info">
          <div class="fee-card-name">${esc(f.fee_name)}</div>
          <div class="fee-card-meta">NZ$${Number(f.amount || 0).toFixed(2)}${due}</div>
        </div>
        <button class="btn-pay" id="pay-btn-${f.id}" onclick="payFee('${f.id}', null)">
          Pay now &mdash; NZ$${Number(f.amount || 0).toFixed(2)}
        </button>
      </div>`
    }).join('')
  }
  html += `</div>`

  // OPTIONAL FEES
  if (optionalAvailable.length) {
    html += `<div class="fees-section">
      <div class="fees-section-title">Optional payments</div>
      <p style="font-family:Arial,sans-serif;font-size:13px;color:var(--gray-mid);margin-bottom:1.1rem;line-height:1.6;">
        These aren't required, but you're welcome to contribute if you'd like to.
      </p>`

    html += optionalAvailable.map(ft => {
      const due  = ft.due_date ? ` &nbsp;·&nbsp; Due ${formatDate(ft.due_date)}` : ''
      const desc = ft.description ? ` &nbsp;·&nbsp; ${esc(ft.description)}` : ''
      return `<div class="fee-card optional">
        <div class="fee-card-info">
          <div class="fee-card-name">${esc(ft.name)}<span class="optional-badge">Optional</span></div>
          <div class="fee-card-meta">NZ$${Number(ft.amount || 0).toFixed(2)}${due}${desc}</div>
        </div>
        <button class="btn-pay" id="pay-btn-opt-${ft.id}" onclick="payFee(null, '${ft.id}')">
          Pay &mdash; NZ$${Number(ft.amount || 0).toFixed(2)}
        </button>
      </div>`
    }).join('')

    html += `</div>`
  }

  // PAYMENT HISTORY
  if (paid.length) {
    html += `<div class="fees-section">
      <div class="fees-section-title">Payment history</div>
      <ul class="paid-list">`

    html += paid.map(f => {
      const paidDate = f.paid_date ? `Paid ${formatDate(f.paid_date)}` : 'Paid'
      const method   = f.blink_payment_id ? ' via Blink Pay' : ''
      return `<li class="paid-item">
        <span class="paid-check">✓</span>
        <span class="paid-item-name">${esc(f.fee_name)}</span>
        <span class="paid-item-amount">NZ$${Number(f.amount || 0).toFixed(2)}</span>
        <span class="paid-item-date">${paidDate}${method}</span>
      </li>`
    }).join('')

    html += `</ul></div>`
  }

  document.getElementById('fees-content').innerHTML = html
}

window.payFee = async function(feeId, feeTypeId) {
  const btnId = feeId ? `pay-btn-${feeId}` : `pay-btn-opt-${feeTypeId}`
  const btn = document.getElementById(btnId)
  if (btn) { btn.textContent = 'Loading…'; btn.disabled = true }

  const { data: { session } } = await supabase.auth.getSession()
  if (!session) { showToast('Please log in first'); return }

  try {
    const body = feeId ? { fee_id: feeId } : { fee_type_id: feeTypeId }
    const resp = await fetch('/.netlify/functions/create-blink-payment', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify(body),
    })

    const result = await resp.json()
    if (!resp.ok || result.error) throw new Error(result.error || 'Payment setup failed')

    // Persist the IDs so payment-success.html can confirm after the redirect
    sessionStorage.setItem('blink_qpid',   result.quick_payment_id)
    sessionStorage.setItem('blink_fee_id', result.fee_id)

    window.location.href = result.url

  } catch (err) {
    if (btn) { btn.textContent = 'Pay now'; btn.disabled = false }
    showToast('Could not start payment — ' + err.message)
  }
}

async function init() {
  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    document.getElementById('fees-logged-out').style.display = 'block'
    return
  }

  userId = session.user.id
  await loadData()
  document.getElementById('fees-content').style.display = 'block'
  render()
}

init()
</script>
</body>
</html>
