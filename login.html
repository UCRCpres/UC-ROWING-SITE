<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login — UC Rowing Club</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: var(--black); min-height: 100vh; display: flex; flex-direction: column; }

  .login-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .login-box {
    background: var(--white);
    border-top: 4px solid var(--red);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
  }

  .login-logo {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 0.25rem;
  }
  .login-logo span { color: var(--red); }

  .login-subtitle {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-mid);
    margin-bottom: 2rem;
  }

  .tab-row {
    display: flex;
    border-bottom: 2px solid var(--border);
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    flex: 1;
    padding: 0.6rem;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    color: var(--gray-mid);
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .error-msg {
    background: #FFF0F0;
    border: 1px solid #FFAAAA;
    color: #CC0000;
    font-family: Arial, sans-serif;
    font-size: 13px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    display: none;
  }
  .success-msg {
    background: #EAF5EA;
    border: 1px solid #AADAAA;
    color: #2D6A2D;
    font-family: Arial, sans-serif;
    font-size: 13px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    display: none;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-mid);
    text-decoration: none;
  }
  .back-link:hover { color: var(--black); }

  .btn-full {
    width: 100%;
    padding: 12px;
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  .spinner {
    display: none;
    text-align: center;
    padding: 1rem;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray-mid);
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo"><span>UC</span> Rowing Club</div>
    <div class="login-subtitle">Members area</div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login', this)">Log in</button>
      <button class="tab-btn" onclick="switchTab('signup', this)">Sign up</button>
      <button class="tab-btn" onclick="switchTab('reset', this)">Reset password</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login" class="tab-panel active">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <div class="spinner" id="login-spinner">Logging in...</div>
      <button class="btn-primary btn-full" onclick="handleLogin()">Log in</button>
    </div>

    <!-- SIGNUP -->
    <div id="tab-signup" class="tab-panel">
      <div class="error-msg" id="signup-error"></div>
      <div class="success-msg" id="signup-success">Check your email to confirm your account, then log in.</div>
      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="signup-name" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="signup-phone" placeholder="021 000 0000">
      </div>
      <div class="form-group">
        <label>Year of study</label>
        <select id="signup-year">
          <option value="">Select...</option>
          <option>1st year</option>
          <option>2nd year</option>
          <option>3rd year</option>
          <option>4th year</option>
          <option>Postgraduate</option>
          <option>Staff / other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters">
      </div>
      <div class="spinner" id="signup-spinner">Creating account...</div>
      <button class="btn-primary btn-full" onclick="handleSignup()">Create account</button>
    </div>

    <!-- RESET -->
    <div id="tab-reset" class="tab-panel">
      <div class="error-msg" id="reset-error"></div>
      <div class="success-msg" id="reset-success">Password reset email sent — check your inbox.</div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="reset-email" placeholder="your@email.com">
      </div>
      <div class="spinner" id="reset-spinner">Sending...</div>
      <button class="btn-primary btn-full" onclick="handleReset()">Send reset email</button>
    </div>

    <a href="index.html" class="back-link">← Back to website</a>
  </div>
</div>

<script type="module">
  import { supabase } from './supabase.js'

  // Redirect if already logged in
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html'
  })

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.getElementById('tab-' + name).classList.add('active')
    btn.classList.add('active')
  }
  window.switchTab = switchTab

  window.handleLogin = async function() {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value
    const err = document.getElementById('login-error')
    const spinner = document.getElementById('login-spinner')
    err.style.display = 'none'
    spinner.style.display = 'block'

    const { error } = await supabase.auth.signInWithPassword({ email, password })
    spinner.style.display = 'none'
    if (error) {
      err.textContent = error.message
      err.style.display = 'block'
    } else {
      window.location.href = 'dashboard.html'
    }
  }

  window.handleSignup = async function() {
    const name = document.getElementById('signup-name').value
    const email = document.getElementById('signup-email').value
    const password = document.getElementById('signup-password').value
    const phone = document.getElementById('signup-phone').value
    const year = document.getElementById('signup-year').value
    const err = document.getElementById('signup-error')
    const success = document.getElementById('signup-success')
    const spinner = document.getElementById('signup-spinner')
    err.style.display = 'none'
    spinner.style.display = 'block'

    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    })
    spinner.style.display = 'none'

    if (error) {
      err.textContent = error.message
      err.style.display = 'block'
      return
    }

    // Create member profile
    if (data.user) {
      await supabase.from('members').insert({
        id: data.user.id,
        email,
        full_name: name,
        phone,
        year_of_study: year
      })
    }
    success.style.display = 'block'
  }

  window.handleReset = async function() {
    const email = document.getElementById('reset-email').value
    const err = document.getElementById('reset-error')
    const success = document.getElementById('reset-success')
    const spinner = document.getElementById('reset-spinner')
    err.style.display = 'none'
    spinner.style.display = 'block'

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    })
    spinner.style.display = 'none'
    if (error) {
      err.textContent = error.message
      err.style.display = 'block'
    } else {
      success.style.display = 'block'
    }
  }

  // Allow enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.tab-panel.active')
      if (active.id === 'tab-login') window.handleLogin()
      if (active.id === 'tab-signup') window.handleSignup()
      if (active.id === 'tab-reset') window.handleReset()
    }
  })
</script>
</body>
</html>
