<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Rowing Club</title>
<link rel="stylesheet" href="style.css">
<style>
  .hero {
    position: relative;
    min-height: 92vh;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('general_photos_and_logos/hero.jpg');
    background-size: cover;
    background-position: center 40%;
    z-index: 0;
  }

  /* Dark gradient overlay so text is readable */
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.2) 40%,
      rgba(107,30,62,0.75) 80%,
      rgba(107,30,62,0.92) 100%
    );
    z-index: 1;
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem 4rem;
    width: 100%;
  }

  .hero-eyebrow {
    font-family: Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    font-weight: 700;
  }

  .hero h1 {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(64px, 10vw, 130px);
    font-weight: 700;
    color: var(--white);
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .hero-tagline {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 1.5rem;
  }

  .hero-sub {
    font-size: 17px;
    color: rgba(255,255,255,0.85);
    max-width: 480px;
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }

  .hero-ctas {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 3rem;
  }

  .hero-stats {
    display: flex;
    gap: 3rem;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 2rem;
    flex-wrap: wrap;
  }

  .hero-stat-num {
    font-family: 'Arial Narrow', Arial, sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .hero-stat-label {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }

  @media (max-width: 768px) {
    .hero-stats { gap: 1.5rem; }
  }
</style>
</head>
<body>

<div id="nav-placeholder" data-active="Home"></div>

<!-- HERO -->
<section style="padding:0;">
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <p class="hero-eyebrow">University of Canterbury · Christchurch, New Zealand</p>
      <h1>UC Rowing Club</h1>
      <p class="hero-tagline">Bleed Maroon.</p>
      <p class="hero-sub">By students, for students — competing at the highest level on the water, with a place for everyone.</p>
      <div class="hero-ctas">
        <a href="join.html" class="btn-gold">Join the club</a>
        <a href="about.html" class="btn-outline" style="color:var(--white); border-color:rgba(255,255,255,0.5);">Learn more</a>
      </div>
      <div class="hero-stats">
        <div>
          <div class="hero-stat-num">36</div>
          <div class="hero-stat-label">Hebberly Shield wins</div>
        </div>
        <div>
          <div class="hero-stat-num">104</div>
          <div class="hero-stat-label">Active members</div>
        </div>
      </div>
    </div>
  </div>


</section>

<!-- SPONSORS -->
<section style="padding: 1rem 2rem 0; text-align: center; border-top: 1px solid var(--border);">
  <p style="font-family: Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 0.5rem;">Proudly sponsored by</p>
  <img src="general_photos_and_logos/SCHICK.png" alt="Schick Civil Construction" style="height: 48px; width: auto; display: block; margin: 0 auto;">
</section>

<div id="footer-placeholder"></div>
<script src="nav.js"></script>
</body>
</html>
